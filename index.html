<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyber39Dream Music Hub</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0d0d0d;
      color:white;
      text-align:center;
    }

    header{
      padding:40px 20px;
      background:linear-gradient(135deg,#111,#1f1f1f);
      border-bottom:2px solid #222;
    }

    h1{
      font-size:3rem;
      margin-bottom:10px;
    }

    p{
      color:#bfbfbf;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:30px 20px;
    }

    .latest{
      background:#151515;
      border:1px solid #2a2a2a;
      border-radius:20px;
      padding:25px;
      margin-bottom:40px;
    }

    .latest h2{
      margin-top:0;
      color:#00ffb3;
    }

    .btn{
      display:inline-block;
      margin-top:15px;
      padding:12px 20px;
      background:#00ffb3;
      color:black;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      transition:0.2s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .songs{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .song-card{
      background:#151515;
      border:1px solid #2a2a2a;
      border-radius:20px;
      padding:20px;
    }

    .song-card h3{
      margin-top:0;
    }

    footer{
      margin-top:50px;
      padding:20px;
      color:#777;
      border-top:1px solid #222;
    }
  </style>
</head>
<body>

  <header>
    <h1>Cyber39Dream</h1>
    <p>Official Music Hub</p>
  </header>

  <div class="container">

    <div class="latest">
      <h2>🔥 Latest Release</h2>
      <h3>Level Up</h3>
      <p>Stream the newest release from Cyber39Dream.</p>

      <a class="btn" href="/latest">
        Listen Now
      </a>
    </div>

    <h2>🎵 Songs</h2>

    <div class="songs">

      <div class="song-card">
        <h3>Level Up</h3>
        <p>Official release by Cyber39Dream.</p>

        <a class="btn" href="/level-up">
          Open
        </a>
      </div>

      <div class="song-card">
        <h3>More Coming Soon...</h3>
        <p>New music is on the way.</p>
      </div>

    </div>

  </div>

  <footer>
    © 2026 Cyber39Dream
  </footer>

</body>
</html>
