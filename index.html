<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Cyber39Dream | Official Music Hub</title>

  <!-- Theme Color -->
  <meta name="theme-color" content="#00ffb3">

  <!-- SEO -->
  <meta name="description" content="Official music hub for Cyber39Dream. Stream the latest releases and stay connected.">

  <!-- Open Graph -->
  <meta property="og:title" content="Cyber39Dream | Official Music Hub">
  <meta property="og:description" content="Official music hub for Cyber39Dream.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://link.c3d.gt.tc">

  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Cyber39Dream | Official Music Hub">
  <meta name="twitter:description" content="Official music hub for Cyber39Dream.">

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:url("https://i.ibb.co/ymWKDmtc/2b8dfe69-7013-4f1e-b36c-d7dde4b435a6.jpg") no-repeat center center fixed;
      background-size:cover;
      color:white;
      text-align:center;
      overflow-x:hidden;
    }

    /* dark overlay for readability */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    header{
      padding:50px 20px;
    }

    h1{
      font-size:3rem;
      margin:0;
    }

    p{
      color:#ccc;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .latest{
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:25px;
      margin-bottom:30px;
      backdrop-filter:blur(10px);
    }

    .songs{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .song-card{
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:20px;
      backdrop-filter:blur(10px);
      transition:0.2s;
    }

    .song-card:hover{
      transform:scale(1.02);
    }

    .song-card img{
      width:100%;
      border-radius:15px;
      margin-bottom:10px;
    }

    .btn{
      display:inline-block;
      margin-top:10px;
      padding:10px 18px;
      background:#00ffb3;
      color:black;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    footer{
      margin-top:40px;
      padding:20px;
      color:#888;
    }
  </style>
</head>

<body>

  <header>
    <h1>Cyber39Dream</h1>
    <p>Official Music Hub</p>
  </header>

  <div class="container">

    <div class="latest">
      <h2>🔥 Latest Release</h2>
      <h3>Level Up</h3>
      <a class="btn" href="/latest">Listen Now</a>
    </div>

    <h2>🎵 Songs</h2>

    <div class="songs">

      <div class="song-card">
        <img src="https://i.ibb.co/HpLDX06Y/In-Shot-20260407-170943908-resized-jpg.png" alt="Level Up Cover">

        <h3>Level Up</h3>
        <p>Official release by Cyber39Dream.</p>

        <a class="btn" href="/level-up">Open</a>
      </div>

    </div>

  </div>

  <footer>
    © 2026 Cyber39Dream
  </footer>

</body>
</html>
